<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Pricing Cards</title>
    <link rel="stylesheet" href="pricingcard-style.css">
</head>
<body>

    <section class="pricing">
        <h1>Our Pricing Plans</h1>

        <div class="pricing-container">

            <div class="card">
                <h2>Basic</h2>
                <h3>₹499</h3>
                <p>✔ 1 Website</p>
                <p>✔ Basic Support</p>
                <p>✔ Responsive Design</p>
                <button>Choose Plan</button>
            </div>

            <div class="card">
                <h2>Standard</h2>
                <h3>₹999</h3>
                <p>✔ 5 Websites</p>
                <p>✔ Priority Support</p>
                <p>✔ Responsive Design</p>
                <button>Choose Plan</button>
            </div>

            <div class="card">
                <h2>Premium</h2>
                <h3>₹1499</h3>
                <p>✔ Unlimited Websites</p>
                <p>✔ 24/7 Support</p>
                <p>✔ Responsive Design</p>
                <button>Choose Plan</button>
            </div>

        </div>
    </section>

</body>
</html>
